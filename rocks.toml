# ROCKS.NVIM

[rocks]
microlight = "1.0"
catppuccin = "0.1.0"
inifile = "1.1"
warna = "0.3.5"
luafilesystem = "1.9.0"
roda = "1.14.0"

# CONFIG
[config]
colorscheme = "abscs"

[config.options]
autochdir = true
clipboard = "unnamedplus"
cmdheight = 0
laststatus = 1
number = true
numberwidth = 3
relativenumber = true
scrolloff = 10000
showtabline = 0
signcolumn = "no"
termguicolors = true
smoothscroll = true
winborder = "rounded"
visualbell = true

# PLUGINS
[plugins]
"cling.nvim"= "0.4.0"
