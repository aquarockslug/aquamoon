# ROCKS.NVIM

[rocks]
microlight = "1.0"
catppuccin = "0.1.0"
inifile = "1.1"
warna = "0.3.5"
luafilesystem = "1.9.0"
roda = "1.0.3"

# CONFIG
[config]
colorscheme = "challenger_deep"

[config.options]
autochdir = true
background = "dark" # TODO create keybind and lua script to control this
clipboard = "unnamedplus"
cmdheight = 0
laststatus = 1
number = true
numberwidth = 3
relativenumber = true
scrolloff = 10000
showtabline = 0
signcolumn = "no"
termguicolors = true
smoothscroll = true
winborder = "rounded"
visualbell = true

# PLUGINS
[plugins]
"dracula.nvim" = "scm"
#"feed.nvim" = "2.19.0"
"lazygit.nvim" = "scm"
