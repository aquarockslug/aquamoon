[aliases]
df = "duf"
du = "dust"
top = "htop"
s = "sudo"
q = "exit"
ls = "eza --color --icons always -F --hyperlink always "
l = "clear && eza --color --icons always -F --hyperlink always "
ll = "eza --color --icons always -F always --hyperlink always -la "
lg = "lazygit"
put = "wl-paste"
yank = "wl-copy"
paru = "paru --bottomup"
chmodx = "sudo chmod u+x"
ddgr = "ddgr --reverse"
hist = "cat ~/.local/share/hilbish/.hilbish-history"
serve = "simple-http-server --nocache --threads 6"
page = "$PAGER"

[hilbish_opts]
autocd = true
history = true
greeting = false
motd = false
fuzzy = true
notifyJobFinish = true

[prompt]
symbol = "󰈿 "
