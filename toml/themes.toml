# MOONFLY https://github.com/bluz71/vim-moonfly-colors
[moonfly]
text_primary = "ae81ff"
text_secondary = "bdbdbd"
background = "080808"
background_alt = "ae81ff"
accent = "cf87e8"
background_image = "~/.aquamoon/wallpapers/aurora.jpg"
border_width = 4
opacity = 0.8
ddgr_colors = "hcegch"

[moonfly.active_font]
name = "BigBlueTermPlus Nerd Font Propo:h14"
path = "'/usr/share/fonts/TTF/BigBlueTermPlusNerdFontPropo-Regular.ttf'"
size = 14

# SWEETIE https://github.com/NTBBloodbath/sweetie.nvim
[sweetie]
text_primary = "92d3c5"
text_secondary = "d3d7de"
background = "2a2a3a"
background_alt = "92d3c5"
accent = "b094e2"
